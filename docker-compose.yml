version: '3.8'

services:
  node1:
    build:
      context: .
      dockerfile: docker/Dockerfile
    hostname: node1
    command: ["--id=node1", "--advertise=node1", "--http=8080", "--grpc=9090", "--gossip=7070", "--seeds=node2:7070,node3:7070", "--db=/data/krato.db", "--wal=/data/krato.wal"]
    ports:
      - "8080:8080"
      - "9090:9090"
      - "7070:7070/udp"
    volumes:
      - node1_data:/data
    environment:
      - KRATO_GEMINI_API_KEY=${GEMINI_API_KEY}

  node2:
    build:
      context: .
      dockerfile: docker/Dockerfile
    hostname: node2
    command: ["--id=node2", "--advertise=node2", "--http=8081", "--grpc=9090", "--gossip=7070", "--seeds=node1:7070,node3:7070", "--db=/data/krato.db", "--wal=/data/krato.wal"]
    ports:
      - "8081:8081"
      - "9091:9090"
      - "7071:7070/udp"
    volumes:
      - node2_data:/data
    environment:
      - KRATO_GEMINI_API_KEY=${GEMINI_API_KEY}

  node3:
    build:
      context: .
      dockerfile: docker/Dockerfile
    hostname: node3
    command: ["--id=node3", "--advertise=node3", "--http=8082", "--grpc=9090", "--gossip=7070", "--seeds=node1:7070,node2:7070", "--db=/data/krato.db", "--wal=/data/krato.wal"]
    ports:
      - "8082:8082"
      - "9092:9090"
      - "7072:7070/udp"
    volumes:
      - node3_data:/data
    environment:
      - KRATO_GEMINI_API_KEY=${GEMINI_API_KEY}

volumes:
  node1_data:
  node2_data:
  node3_data:

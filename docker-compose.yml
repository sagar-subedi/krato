version: '3.8'

services:
  node1:
    build:
      context: .
      dockerfile: docker/Dockerfile
    hostname: node1
    command: ["--id=node1", "--advertise=node1", "--http=18080", "--grpc=19090", "--gossip=17070", "--seeds=node2:17070,node3:17070,node4:17070,node5:17070", "--db=/data/krato.db", "--wal=/data/krato.wal"]
    ports:
      - "18080:18080"
      - "19090:19090"
      - "17070:17070/udp"
    volumes:
      - node1_data:/data
    environment:
      - KRATO_GEMINI_API_KEY=${GEMINI_API_KEY}

  node2:
    build:
      context: .
      dockerfile: docker/Dockerfile
    hostname: node2
    command: ["--id=node2", "--advertise=node2", "--http=18081", "--grpc=19090", "--gossip=17070", "--seeds=node1:17070,node3:17070,node4:17070,node5:17070", "--db=/data/krato.db", "--wal=/data/krato.wal"]
    ports:
      - "18081:18081"
      - "19091:19090"
      - "17071:17070/udp"
    volumes:
      - node2_data:/data
    environment:
      - KRATO_GEMINI_API_KEY=${GEMINI_API_KEY}

  node3:
    build:
      context: .
      dockerfile: docker/Dockerfile
    hostname: node3
    command: ["--id=node3", "--advertise=node3", "--http=18082", "--grpc=19090", "--gossip=17070", "--seeds=node1:17070,node2:17070,node4:17070,node5:17070", "--db=/data/krato.db", "--wal=/data/krato.wal"]
    ports:
      - "18082:18082"
      - "19092:19090"
      - "17072:17070/udp"
    volumes:
      - node3_data:/data
    environment:
      - KRATO_GEMINI_API_KEY=${GEMINI_API_KEY}

  node4:
    build:
      context: .
      dockerfile: docker/Dockerfile
    hostname: node4
    command: ["--id=node4", "--advertise=node4", "--http=18083", "--grpc=19090", "--gossip=17070", "--seeds=node1:17070,node2:17070,node3:17070,node5:17070", "--db=/data/krato.db", "--wal=/data/krato.wal"]
    ports:
      - "18085:18083"
      - "19093:19090"
      - "17073:17070/udp"
    volumes:
      - node4_data:/data
    environment:
      - KRATO_GEMINI_API_KEY=${GEMINI_API_KEY}

  node5:
    build:
      context: .
      dockerfile: docker/Dockerfile
    hostname: node5
    command: ["--id=node5", "--advertise=node5", "--http=18084", "--grpc=19090", "--gossip=17070", "--seeds=node1:17070,node2:17070,node3:17070,node4:17070", "--db=/data/krato.db", "--wal=/data/krato.wal"]
    ports:
      - "18086:18084"
      - "19094:19090"
      - "17074:17070/udp"
    volumes:
      - node5_data:/data
    environment:
      - KRATO_GEMINI_API_KEY=${GEMINI_API_KEY}

volumes:
  node1_data:
  node2_data:
  node3_data:
  node4_data:
  node5_data:

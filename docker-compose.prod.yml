# Krato Production Cluster - VPS Deployment
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  node1:
    image: ${REGISTRY}/${IMAGE_NAME}:latest
    restart: always
    hostname: node1
    command: ["--id=node1", "--advertise=${VPS_IP}", "--http=18080", "--grpc=19090", "--gossip=17070", "--seeds=node2:17071,node3:17072,node4:17073,node5:17074", "--db=/data/krato.db", "--wal=/data/krato.wal", "--rf=3"]
    ports:
      - "18080:18080"
      - "19090:19090"
      - "17070:17070/udp"
    volumes:
      - node1_data:/data
    environment:
      - KRATO_GEMINI_API_KEY=${GEMINI_API_KEY}

  node2:
    image: ${REGISTRY}/${IMAGE_NAME}:latest
    restart: always
    hostname: node2
    command: ["--id=node2", "--advertise=${VPS_IP}", "--http=18081", "--grpc=19091", "--gossip=17071", "--seeds=node1:17070,node3:17072,node4:17073,node5:17074", "--db=/data/krato.db", "--wal=/data/krato.wal", "--rf=3"]
    ports:
      - "18081:18081"
      - "19091:19091"
      - "17071:17071/udp"
    volumes:
      - node2_data:/data
    environment:
      - KRATO_GEMINI_API_KEY=${GEMINI_API_KEY}

  node3:
    image: ${REGISTRY}/${IMAGE_NAME}:latest
    restart: always
    hostname: node3
    command: ["--id=node3", "--advertise=${VPS_IP}", "--http=18082", "--grpc=19092", "--gossip=17072", "--seeds=node1:17070,node2:17071,node4:17073,node5:17074", "--db=/data/krato.db", "--wal=/data/krato.wal", "--rf=3"]
    ports:
      - "18082:18082"
      - "19092:19092"
      - "17072:17072/udp"
    volumes:
      - node3_data:/data
    environment:
      - KRATO_GEMINI_API_KEY=${GEMINI_API_KEY}

  node4:
    image: ${REGISTRY}/${IMAGE_NAME}:latest
    restart: always
    hostname: node4
    command: ["--id=node4", "--advertise=${VPS_IP}", "--http=18083", "--grpc=19093", "--gossip=17073", "--seeds=node1:17070,node2:17071,node3:17072,node5:17074", "--db=/data/krato.db", "--wal=/data/krato.wal", "--rf=3"]
    ports:
      - "18083:18083"
      - "19093:19093"
      - "17073:17073/udp"
    volumes:
      - node4_data:/data
    environment:
      - KRATO_GEMINI_API_KEY=${GEMINI_API_KEY}

  node5:
    image: ${REGISTRY}/${IMAGE_NAME}:latest
    restart: always
    hostname: node5
    command: ["--id=node5", "--advertise=${VPS_IP}", "--http=18084", "--grpc=19094", "--gossip=17074", "--seeds=node1:17070,node2:17071,node3:17072,node4:17073", "--db=/data/krato.db", "--wal=/data/krato.wal", "--rf=3"]
    ports:
      - "18084:18084"
      - "19094:19094"
      - "17074:17074/udp"
    volumes:
      - node5_data:/data
    environment:
      - KRATO_GEMINI_API_KEY=${GEMINI_API_KEY}

volumes:
  node1_data:
  node2_data:
  node3_data:
  node4_data:
  node5_data:
